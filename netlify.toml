[build]
  publish = "website"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "EMAIL_FROM,EMAIL_REPLY_TO"

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/api/stripe/webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/app-payment"
  to = "/.netlify/functions/app-payment"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
