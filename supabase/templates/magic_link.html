<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tu enlace seguro para entrar a JobVisto</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7f2;font-family:Arial,Helvetica,sans-serif;color:#10201b;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7f2;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border:1px solid #dbe5e1;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="background:#07302d;padding:28px 30px;color:#ffffff;">
                <div style="font-size:26px;font-weight:800;">JobVisto</div>
                <div style="margin-top:8px;color:#bfe6d5;font-size:14px;">Entra de forma segura.</div>
              </td>
            </tr>
            <tr>
              <td style="padding:34px 30px 28px;">
                <h1 style="margin:0 0 14px;font-size:26px;line-height:1.2;color:#07302d;">Tu enlace de acceso</h1>
                <p style="margin:0 0 18px;font-size:16px;line-height:1.6;color:#4e5a70;">Usa este enlace para entrar a JobVisto sin escribir contraseña.</p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:28px 0;">
                  <tr>
                    <td style="border-radius:8px;background:#1f7a58;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:15px 24px;color:#ffffff;text-decoration:none;font-weight:800;font-size:15px;">Entrar a JobVisto</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;word-break:break-all;font-size:13px;line-height:1.5;color:#1f7a58;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 30px;background:#f8fbf7;color:#708078;font-size:13px;line-height:1.5;">
                Si no solicitaste este enlace, ignora este correo.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
